<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./css/style6.css" />
    <title>회원가입 폼</title>
  </head>
  <body>
    <div class="form-container">
      <h2>회원가입</h2>

      <form id="signupForm">
        <div class="form-group">
          <label for="userName">이름:</label>
          <input type="text" id="userName" name="userName" required />
        </div>

        <div class="form-group">
          <label for="userEmail">이메일:</label>
          <input type="email" id="userEmail" name="userEmail" required />
        </div>

        <div class="form-group">
          <label for="userAge">나이:</label>
          <input type="number" id="userAge" name="userAge" min="1" max="120" />
        </div>

        <div class="form-group">
          <label>성별:</label>
          <input type="radio" id="male" name="gender" value="남성" />
          <label for="male" style="display: inline; margin-left: 5px"
            >남성</label
          >
          <input type="radio" id="female" name="gender" value="여성" />
          <label for="female" style="display: inline; margin-left: 5px"
            >여성</label
          >
        </div>

        <div class="form-group">
          <label for="userCity">거주지역:</label>
          <select id="userCity" name="userCity">
            <option value="">선택해주세요</option>
            <option value="서울">서울</option>
            <option value="부산">부산</option>
            <option value="대구">대구</option>
            <option value="인천">인천</option>
          </select>
        </div>

        <div class="form-group">
          <input type="checkbox" id="agree" name="agree" />
          <label for="agree" style="display: inline; margin-left: 5px"
            >개인정보 처리방침에 동의합니다</label
          >
        </div>
        <button type="button" onclick="processForm()">가입하기</button>
      </form>

      <div id="result" class="result" style="display: none"></div>
    </div>

    <script src="./js/test6.js"></script>
  </body>
</html>
